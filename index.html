<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兩河流域行事曆</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* ═══════════════════════════════════════════════════════════════
           兩河流域行事曆  ·  日式記事本  Japanese Stationery Notebook
           靈感：Hobonichi Techo · MD Notebook · Midori Traveler
        ═══════════════════════════════════════════════════════════════ */

        :root {
            --wa:          #f9f5ed;
            --wa-2:        #f2ede2;
            --wa-3:        #e8e0d0;
            --wa-shadow:   #ddd4c0;
            --sumi:        #1a1510;
            --sumi-2:      #3a3128;
            --sumi-3:      #6b5f4f;
            --sumi-4:      #a0917f;
            --sumi-5:      #c8bbaa;
            --sumi-6:      #e0d7c8;
            --shu:         #c0392b;
            --shu-hi:      #e05a4a;
            --shu-wash:    #f7ecea;
            --ai:          #2c4f7c;
            --ai-hi:       #3d6a9e;
            --ai-wash:     #e8eff8;
            --midori:      #4a7055;
            --midori-wash: #ebf3ed;
            --kohaku:      #b07d2e;
            --kohaku-wash: #f5eedf;
            --ease: cubic-bezier(.25,.46,.45,.94);
            --ease-out: cubic-bezier(.16,1,.3,1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100%; }

        body {
            font-family: 'Noto Serif TC', 'Shippori Mincho', serif;
            font-size: 15px;
            line-height: 1.75;
            color: var(--sumi);
            background: var(--wa-3);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent 0px, transparent 27px, var(--sumi-6) 27px, var(--sumi-6) 28px),
                repeating-linear-gradient(90deg, transparent 0px, transparent 27px, rgba(200,187,170,.4) 27px, rgba(200,187,170,.4) 28px),
                var(--wa);
            background-size: 28px 28px;
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: '';
            position: fixed; top: 0; bottom: 0; left: 0;
            width: 32px;
            background: linear-gradient(90deg, rgba(26,21,16,.12) 0%, rgba(26,21,16,.06) 40%, transparent 100%);
            pointer-events: none; z-index: 1;
        }

        .page-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px 120px 48px;
            position: relative; z-index: 2;
        }

        header.masthead {
            padding: 52px 0 36px;
            position: relative;
            margin-bottom: 36px;
        }

        .masthead-eyebrow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; letter-spacing: 3px;
            color: var(--sumi-4); text-transform: uppercase;
            padding-bottom: 16px; margin-bottom: 24px;
            border-bottom: 1px solid var(--sumi-5);
        }

        .masthead-eyebrow .volume { color: var(--shu); font-weight: 500; }

        h1.masthead-title {
            font-family: 'Shippori Mincho', serif;
            font-weight: 700;
            font-size: clamp(2.8rem, 8vw, 5.2rem);
            letter-spacing: -.02em; line-height: .9;
            color: var(--sumi);
            position: relative;
        }

        h1.masthead-title::after {
            content: '';
            position: absolute; left: 0; bottom: -10px;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--shu), transparent);
        }

        .masthead-tagline {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9.5px; letter-spacing: 3.5px;
            color: var(--sumi-4); text-transform: uppercase;
            margin-top: 20px;
        }

        .form-paper {
            background: var(--wa-2);
            border: 1px solid var(--sumi-5);
            border-left: 3px solid var(--kohaku);
            padding: 28px;
            margin-bottom: 40px;
            box-shadow: 0 2px 12px rgba(26,21,16,.08), inset 0 1px 0 rgba(255,255,255,.5);
            position: relative;
        }

        .form-paper::before {
            content: '新規';
            position: absolute; top: -10px; left: 20px;
            background: var(--wa-2); padding: 0 8px;
            font-family: 'Shippori Mincho', serif; font-size: 10px;
            letter-spacing: 3px; color: var(--kohaku); font-weight: 600;
            border: 1px solid rgba(176,125,46,.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--sumi-3);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 12px 14px;
            border: 1px solid var(--sumi-5);
            background: var(--wa);
            font-family: 'Noto Serif TC', serif;
            font-size: 14px;
            color: var(--sumi);
            transition: all .2s var(--ease);
            box-shadow: inset 0 1px 3px rgba(26,21,16,.05);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--kohaku);
            box-shadow: 0 0 0 3px rgba(176,125,46,.12), inset 0 1px 3px rgba(26,21,16,.05);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            font-family: 'Shippori Mincho', serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s var(--ease);
            letter-spacing: .5px;
        }

        .btn-primary {
            background: var(--kohaku);
            color: white;
            box-shadow: 2px 2px 0 var(--sumi-2);
        }

        .btn-primary:hover {
            background: #9a6b28;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--sumi-2);
        }

        .btn-primary:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--sumi-2);
        }

        .filter-paper {
            background: var(--ai-wash);
            border: 1px solid rgba(44,79,124,.2);
            padding: 20px 24px;
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--ai);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .filter-group select {
            padding: 10px 12px;
            border: 1px solid rgba(44,79,124,.3);
            background: white;
            font-family: 'Noto Serif TC', serif;
            font-size: 13px;
            color: var(--sumi);
        }

        .event-category {
            margin-bottom: 48px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--sumi-6);
        }

        .category-icon {
            width: 32px;
            height: 32px;
            background: var(--shu);
            color: white;
            display: grid;
            place-items: center;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 2px 2px 0 var(--sumi-2);
        }

        .category-icon.previous {
            background: var(--sumi-4);
        }

        .category-title {
            font-family: 'Shippori Mincho', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--sumi);
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .event-card {
            background: var(--wa-2);
            border: 1px solid var(--sumi-5);
            border-left: 4px solid var(--kohaku);
            padding: 20px 24px;
            transition: all .3s var(--ease);
            box-shadow: 0 1px 4px rgba(26,21,16,.06);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .event-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26,21,16,.12);
        }

        .event-card.past-event {
            opacity: 0.65;
            border-left-color: var(--sumi-4);
        }

        .event-card.past-event:hover {
            opacity: 1;
        }

        .event-main {
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 2fr 1.5fr 1fr 0.8fr;
            gap: 16px;
            align-items: center;
        }

        .event-title {
            font-family: 'Shippori Mincho', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--sumi);
            line-height: 1.4;
        }

        .event-time {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 13px;
            color: var(--sumi-2);
        }

        .event-location-inline {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 13px;
            color: var(--sumi-3);
        }

        .event-author-inline {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--sumi-4);
            text-transform: uppercase;
        }

        .event-duration-inline {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--kohaku);
            font-weight: 500;
            text-align: right;
        }

        .event-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-edit {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--midori);
            color: var(--midori);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s var(--ease);
            white-space: nowrap;
        }

        .btn-edit:hover {
            background: var(--midori);
            color: white;
        }

        .btn-gcal {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--ai);
            color: var(--ai);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s var(--ease);
            text-decoration: none;
            display: inline-block;
        }

        .btn-gcal:hover {
            background: var(--ai);
            color: white;
        }

        .btn-delete {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--sumi-5);
            color: var(--sumi-3);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all .2s var(--ease);
        }

        .btn-delete:hover {
            background: var(--shu-wash);
            border-color: var(--shu);
            color: var(--shu);
        }

        .event-meta {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 13px;
            color: var(--sumi-3);
            margin-bottom: 12px;
        }

        .event-meta-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--sumi-4);
            text-transform: uppercase;
        }

        .event-meta-value {
            color: var(--sumi-2);
        }

        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--sumi-6);
            margin-top: 12px;
        }

        .event-author {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--sumi-4);
            text-transform: uppercase;
        }

        .event-duration {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--kohaku);
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--sumi-4);
            font-size: 14px;
        }

        .empty-state::before {
            content: '📝';
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .firebase-status {
            text-align: center;
            margin-top: 40px;
            padding: 16px;
            background: var(--midori-wash);
            border: 1px solid rgba(74,112,85,.2);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--sumi-4);
            text-transform: uppercase;
        }

        .firebase-status.connected {
            color: var(--midori);
        }

        .firebase-status.error {
            background: var(--shu-wash);
            border-color: rgba(192,57,43,.2);
            color: var(--shu);
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--sumi);
            color: white;
            padding: 14px 24px;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(26,21,16,.3);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all .3s var(--ease-out);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .page-wrap {
                padding: 0 20px 80px 28px;
            }
            h1.masthead-title {
                font-size: 2.4rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .event-card {
                flex-direction: column;
                align-items: stretch;
            }
            .event-main {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .event-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <header class="masthead">
            <div class="masthead-eyebrow">
                <span class="volume">記事曆</span>
                <span class="issue-no">2026</span>
            </div>
            <h1 class="masthead-title">兩河流域行事曆</h1>
            <p class="masthead-tagline">記錄每一個美好時光</p>
        </header>

        <div class="form-paper">
            <div class="form-grid">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" required>
                </div>
                
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" required>
                </div>
                
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="author" placeholder="你的名字" required>
                </div>
                
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="time" id="startTime" required>
                </div>
                
                <div class="form-group">
                    <label>End Time</label>
                    <input type="time" id="endTime" required>
                </div>
                
                <div class="form-group full-width">
                    <label>Event Content</label>
                    <input type="text" id="content" placeholder="例如：浪漫約會、紀念日慶祝..." required>
                </div>
                
                <div class="form-group full-width">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="例如：台北 101、淡水老街、信義區..." required>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="addEvent()">✓ 新增事項</button>
        </div>

        <div class="filter-paper">
            <div class="filter-group">
                <label>年度篩選</label>
                <select id="filterYear" onchange="filterEvents()">
                    <option value="">全部年度</option>
                </select>
            </div>
            <div class="filter-group">
                <label>月份篩選</label>
                <select id="filterMonth" onchange="filterEvents()">
                    <option value="">全部月份</option>
                    <option value="1">1月</option>
                    <option value="2">2月</option>
                    <option value="3">3月</option>
                    <option value="4">4月</option>
                    <option value="5">5月</option>
                    <option value="6">6月</option>
                    <option value="7">7月</option>
                    <option value="8">8月</option>
                    <option value="9">9月</option>
                    <option value="10">10月</option>
                    <option value="11">11月</option>
                    <option value="12">12月</option>
                </select>
            </div>
        </div>

        <div class="event-category">
            <div class="category-header">
                <div class="category-icon upcoming">📌</div>
                <h2 class="category-title">即將到來（一個月內）</h2>
            </div>
            <div id="upcomingList" class="event-list">
                <div class="empty-state">目前沒有即將到來的行程</div>
            </div>
        </div>

        <div class="event-category">
            <div class="category-header">
                <div class="category-icon previous">📝</div>
                <h2 class="category-title">過往記錄</h2>
            </div>
            <div id="previousList" class="event-list">
                <div class="empty-state">目前沒有過往記錄</div>
            </div>
        </div>

        <div id="firebaseStatus" class="firebase-status">
            正在連接 Firebase...
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, push, onValue, remove, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCagZmPhE5iVDuD-GTXqIOxC7w1HZX5D9Q",
            authDomain: "couple-calendar-48ce0.firebaseapp.com",
            databaseURL: "https://couple-calendar-48ce0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "couple-calendar-48ce0",
            storageBucket: "couple-calendar-48ce0.firebasestorage.app",
            messagingSenderId: "287769168794",
            appId: "1:287769168794:web:cbc81a1e46d4bac2c90823",
            measurementId: "G-G3T2TSSPDV"
        };

        let app, database;
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            updateFirebaseStatus('connected', '✓ 已連接到雲端');
            
            const eventsRef = ref(database, 'events');
            onValue(eventsRef, (snapshot) => {
                const data = snapshot.val();
                displayEvents(data);
            });
        } catch (error) {
            console.error('Firebase 初始化錯誤:', error);
            updateFirebaseStatus('error', '⚠ Firebase 配置錯誤，請檢查設定');
        }

        let editingEventId = null;

        window.addEvent = async function() {
            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;
            const endDate = document.getElementById('endDate').value;
            const endTime = document.getElementById('endTime').value;
            const content = document.getElementById('content').value.trim();
            const location = document.getElementById('location').value.trim();
            const author = document.getElementById('author').value.trim();

            if (!startDate || !startTime || !endDate || !endTime || !content || !location || !author) {
                showToast('請填寫所有欄位！');
                return;
            }

            const startTimestamp = new Date(`${startDate}T${startTime}`).getTime();
            const endTimestamp = new Date(`${endDate}T${endTime}`).getTime();

            if (endTimestamp <= startTimestamp) {
                showToast('結束時間必須晚於開始時間！');
                return;
            }

            const event = {
                startDate, startTime, endDate, endTime,
                content, location, author,
                startTimestamp, endTimestamp
            };

            try {
                if (editingEventId) {
                    // 更新現有事件
                    const eventRef = ref(database, `events/${editingEventId}`);
                    await update(eventRef, event);
                    showToast('✓ 行程已更新！');
                    editingEventId = null;
                    document.querySelector('.btn-primary').textContent = '✓ 新增事項';
                } else {
                    // 新增事件
                    const eventsRef = ref(database, 'events');
                    push(eventsRef, event);
                    showToast('✓ 行程已新增！');
                }
                
                // 清空表單
                document.getElementById('content').value = '';
                document.getElementById('location').value = '';
                document.getElementById('author').value = '';
                
            } catch (error) {
                console.error('操作失敗:', error);
                showToast('操作失敗，請檢查 Firebase 連接');
            }
        };

        window.editEvent = async function(eventId) {
            try {
                const eventRef = ref(database, `events/${eventId}`);
                const snapshot = await get(eventRef);
                
                if (snapshot.exists()) {
                    const event = snapshot.val();
                    
                    // 填入表單
                    document.getElementById('startDate').value = event.startDate;
                    document.getElementById('startTime').value = event.startTime;
                    document.getElementById('endDate').value = event.endDate;
                    document.getElementById('endTime').value = event.endTime;
                    document.getElementById('content').value = event.content;
                    document.getElementById('location').value = event.location;
                    document.getElementById('author').value = event.author;
                    
                    // 設定編輯模式
                    editingEventId = eventId;
                    document.querySelector('.btn-primary').textContent = '✓ 更新事項';
                    
                    // 滾動到表單
                    document.querySelector('.form-paper').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    showToast('📝 編輯模式：修改完成後點擊更新');
                }
            } catch (error) {
                console.error('載入事件失敗:', error);
                showToast('載入失敗');
            }
        };

        window.deleteEvent = function(eventId) {
            if (confirm('確定要刪除這個行程嗎？')) {
                try {
                    const eventRef = ref(database, `events/${eventId}`);
                    remove(eventRef);
                    showToast('✓ 行程已刪除');
                } catch (error) {
                    console.error('刪除失敗:', error);
                    showToast('刪除失敗');
                }
            }
        };

        function displayEvents(data) {
            const upcomingList = document.getElementById('upcomingList');
            const previousList = document.getElementById('previousList');
            
            if (!data) {
                upcomingList.innerHTML = '<div class="empty-state">目前沒有即將到來的行程</div>';
                previousList.innerHTML = '<div class="empty-state">目前沒有過往記錄</div>';
                return;
            }

            const events = Object.entries(data).map(([id, event]) => ({ id, ...event }));
            events.sort((a, b) => a.startTimestamp - b.startTimestamp);

            const filterYear = document.getElementById('filterYear').value;
            const filterMonth = document.getElementById('filterMonth').value;

            let filteredEvents = events;
            if (filterYear) {
                filteredEvents = filteredEvents.filter(event => {
                    const eventYear = new Date(event.startDate).getFullYear();
                    return eventYear === parseInt(filterYear);
                });
            }
            if (filterMonth) {
                filteredEvents = filteredEvents.filter(event => {
                    const eventMonth = new Date(event.startDate).getMonth() + 1;
                    return eventMonth === parseInt(filterMonth);
                });
            }

            const now = new Date();
            const oneMonthLater = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

            const upcomingEvents = filteredEvents.filter(event => 
                event.startTimestamp >= now.getTime() && event.startTimestamp <= oneMonthLater.getTime()
            );

            const previousEvents = filteredEvents.filter(event => 
                event.startTimestamp < now.getTime() || event.startTimestamp > oneMonthLater.getTime()
            );

            if (upcomingEvents.length === 0) {
                upcomingList.innerHTML = '<div class="empty-state">目前沒有即將到來的行程</div>';
            } else {
                upcomingList.innerHTML = upcomingEvents.map(event => renderEvent(event)).join('');
            }

            if (previousEvents.length === 0) {
                previousList.innerHTML = '<div class="empty-state">目前沒有過往記錄</div>';
            } else {
                previousList.innerHTML = previousEvents.map(event => renderEvent(event)).join('');
            }

            updateYearFilter(events);
        }

        function renderEvent(event) {
            const duration = calculateDuration(event.startTimestamp, event.endTimestamp);
            const isSameDay = event.startDate === event.endDate;
            const isPast = event.startTimestamp < new Date().getTime();
            const gcalUrl = buildGoogleCalendarUrl(event);
            
            const timeDisplay = `${formatDateShort(event.startDate)} ${event.startTime} → ${!isSameDay ? formatDateShort(event.endDate) + ' ' : ''}${event.endTime}`;
            
            return `
                <div class="event-card ${isPast ? 'past-event' : ''}">
                    <div class="event-main">
                        <div class="event-title">${escapeHtml(event.content)}</div>
                        <div class="event-time">${timeDisplay}</div>
                        <div class="event-location-inline">📍 ${escapeHtml(event.location)}</div>
                        <div class="event-author-inline">${escapeHtml(event.author)}</div>
                        <div class="event-duration-inline">${isPast ? '' : '⏱ ' + duration}</div>
                    </div>
                    <div class="event-actions">
                        <button class="btn-edit" onclick="editEvent('${event.id}')">編輯</button>
                        <a href="${gcalUrl}" target="_blank" class="btn-gcal">+ GCAL</a>
                        <button class="btn-delete" onclick="deleteEvent('${event.id}')">刪除</button>
                    </div>
                </div>
            `;
        }

        function formatDateShort(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}/${day}`;
        }

        function buildGoogleCalendarUrl(event) {
            const formatGCalDateTime = (date, time) => {
                return date.replace(/-/g, '') + 'T' + time.replace(':', '') + '00';
            };

            const start = formatGCalDateTime(event.startDate, event.startTime);
            const end = formatGCalDateTime(event.endDate, event.endTime);

            return 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
                '&text=' + encodeURIComponent(event.content) +
                '&dates=' + start + '/' + end +
                '&location=' + encodeURIComponent(event.location) +
                '&details=' + encodeURIComponent('填表人：' + event.author);
        }

        function calculateDuration(startTime, endTime) {
            const diff = endTime - startTime;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            if (hours >= 24) {
                const days = Math.floor(hours / 24);
                const remainHours = hours % 24;
                return `${days}天${remainHours > 0 ? remainHours + '小時' : ''}`;
            } else if (hours > 0) {
                return `${hours}小時${minutes > 0 ? minutes + '分' : ''}`;
            } else {
                return `${minutes}分鐘`;
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[date.getDay()];
            
            return `${year}/${month}/${day}（${weekday}）`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateFirebaseStatus(status, message) {
            const statusEl = document.getElementById('firebaseStatus');
            statusEl.textContent = message;
            statusEl.className = `firebase-status ${status}`;
        }

        function updateYearFilter(events) {
            const filterYear = document.getElementById('filterYear');
            const currentSelection = filterYear.value;
            
            const years = [...new Set(events.map(event => new Date(event.startDate).getFullYear()))];
            years.sort((a, b) => b - a);

            filterYear.innerHTML = '<option value="">全部年度</option>';
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = `${year} 年`;
                if (year.toString() === currentSelection) {
                    option.selected = true;
                }
                filterYear.appendChild(option);
            });
        }

        window.filterEvents = function() {
            const eventsRef = ref(database, 'events');
            onValue(eventsRef, (snapshot) => {
                const data = snapshot.val();
                displayEvents(data);
            }, { onlyOnce: true });
        };

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2600);
        }

        function initDate() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = dateStr;
            document.getElementById('endDate').value = dateStr;
        }

        initDate();
    </script>
</body>
</html>
